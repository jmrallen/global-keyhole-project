site_name: Global Keyhole Pipeline
site_description: Pipeline for processing declassified KH-9 (and related) satellite imagery into DEMs and orthorectified mosaics.
site_url: https://jmrallen.github.io/global-keyhole-pipeline/
repo_url: https://github.com/jmrallen/global-keyhole-pipeline
repo_name: jmrallen/global-keyhole-pipeline
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Pipeline:
      - pipeline/index.md
      - S0 — Pre-processing: pipeline/s0-preprocessing.md
      - S1 — Per-pair cameras: pipeline/s1-cameras.md
      - S2 — Multi-strip jitter solve: pipeline/s2-jitter-solve.md
      - lib/ reference: pipeline/lib-reference.md
  - Image Archive: archive/index.md
  - Reference:
      - Troubleshooting: reference/troubleshooting.md
      - ASP cheatsheet: reference/asp-cheatsheet.md
